# Gemini REST client
quarkus.rest-client.gemini.url=https://generativelanguage.googleapis.com

# Gemini API key - override via GEMINI_API_KEY env var in production
gemini.api-key=${GEMINI_API_KEY:changeme}

# CORS - tighten origins in production
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type

# Swagger UI always available (remove or restrict in production)
quarkus.swagger-ui.always-include=true
