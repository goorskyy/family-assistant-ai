# Gemini
gemini.api.key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL:gemini-3-flash-preview}

# CORS - tighten origins in production
quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=http://localhost:3000
%prod.quarkus.http.cors.origins=${CORS_ALLOWED_ORIGINS}
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type

# Swagger UI always available (remove or restrict in production)
quarkus.swagger-ui.always-include=true
